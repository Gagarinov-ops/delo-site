<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Планировщик – Фундамент (слоёный пирог, шаг А)</title>
  <style>
    html, body { margin:0; padding:0; overscroll-behavior: none; touch-action: none; background: #f0f0f0; }
    .canvas-container {
      position: relative;
      display: inline-block;
    }
    canvas {
      display: block;
      touch-action: none;
      overscroll-behavior: none;
      cursor: default;
    }
    #overlayCanvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }
    .toolbar {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background: white;
      padding: 5px;
      border-radius: 4px;
      z-index: 100;
      display: flex;
      gap: 8px;
    }
    button {
      min-height: 44px;
      min-width: 44px;
      font-size: 16px;
      padding: 8px 12px;
      touch-action: manipulation;
    }
  </style>
</head>
<body>
  <div class="canvas-container">
    <canvas id="mainCanvas" width="1000" height="700"></canvas>
    <canvas id="overlayCanvas" width="1000" height="700"></canvas>
  </div>
  <div class="toolbar">
    <button id="btnPencil">Карандаш</button>
    <button id="btnCursor">Курсор</button>
    <button id="btnResetCamera">Сбросить камеру</button>
    <button id="btnResetData">Сбросить данные</button>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/canvas-data.js"></script>
  <script src="js/calculator.js"></script>
  <script src="js/geometry-validator.js"></script>
  <script src="js/hit-test.js"></script>
  <script src="js/graph-analyzer.js"></script>
  <script src="js/registry.js"></script>
  <script src="js/bridge.js"></script>
  <script src="js/toast.js"></script>
  <script src="js/tools/pencil-tool.js"></script>
  <script src="js/canvas-renderer.js"></script>

  <script>
    const canvas = document.getElementById('mainCanvas');
    const overlayCanvas = document.getElementById('overlayCanvas');
    window.overlayCanvas = overlayCanvas;

    CanvasData._upgradeWalls();
    initCanvas(canvas);

    document.getElementById('btnPencil').addEventListener('click', () => {
      PencilTool.activate(canvas);
      console.log('Инструмент: Карандаш');
    });
    document.getElementById('btnCursor').addEventListener('click', () => {
      PencilTool.deactivate();
      console.log('Инструмент: Курсор');
    });
    document.getElementById('btnResetCamera').addEventListener('click', () => resetCamera(canvas));
    document.getElementById('btnResetData').addEventListener('click', () => {
      CanvasData.reset();
      requestRender(canvas);
      console.log('Данные сброшены');
    });
  </script>
</body>
</html>
