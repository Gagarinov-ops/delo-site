<!DOCTYPE html>  
<html lang="ru">  
<head>  
  <meta charset="UTF-8">  
  <title>Изолирующий тест панорамирования</title>  
  <style>  
    html, body {  
      margin: 0;  
      padding: 0;  
      overscroll-behavior: none;  
      touch-action: none;  
      background: #e0e0e0;  
    }  
    canvas {  
      display: block;  
      touch-action: none;  
      overscroll-behavior: none;  
    }  
  </style>  
</head>  
<body>  
  <canvas id="mainCanvas" width="800" height="600"></canvas>  

  <script src="constants.js"></script>  
  <script src="canvas-data.js"></script>  
  <script src="calculator.js"></script>  
  <script src="bridge.js"></script>  
  <script src="canvas-renderer.js"></script>  

  <script>  
    const canvas = document.getElementById('mainCanvas');  
    initCanvas(canvas);  
    console.log('Изолирующий тест запущен. Попробуйте панорамировать зажатием левой кнопки мыши.');  
  </script>  
</body>  
</html>
