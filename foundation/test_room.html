<!DOCTYPE html>  
<html lang="ru">  
<head>  
    <meta charset="UTF-8">  
    <title>Тестовый полигон — Комнаты + Проёмы</title>  
    <style>  
        body { font-family: monospace; margin: 20px; }  
        canvas { border: 1px solid #333; margin-top: 10px; }  
        button { margin: 5px; padding: 6px 12px; }  
    </style>  
</head>  
<body>  
    <h2>Тестовый полигон — Проёмы (окна/двери)</h2>  
    <div>  
        <button id="btnCreateRoom">Создать комнату (3000x2000, высота 2500)</button>  
        <button id="btnAddWindow">Добавить окно (стена 1, ширина 1300, высота 1300, центр 1500)</button>  
        <button id="btnAddDoor">Добавить дверь (стена 2, ширина 800, высота 2100, центр 1000)</button>  
        <button id="btnShowData">Показать CanvasData</button>  
        <button id="btnReset">Сбросить Хранилище</button>  
    </div>  
    <canvas id="mainCanvas" width="800" height="600"></canvas>  

    <script src="js/constants.js"></script>  
    <script src="js/canvas-data.js"></script>  
    <script src="js/calculator.js"></script>  
    <script src="js/geometry-validator.js"></script>  
    <script src="js/registry.js"></script>  
    <script src="js/bridge.js"></script>  
    <script src="js/canvas-renderer.js"></script>  

    <script>  
        let roomId = null;  
        let wall1Id = null, wall2Id = null, wall3Id = null, wall4Id = null;  

        function createRoom() {  
            CanvasData.reset();  
            const pt1 = registerPoint(0, 0).data.pointId;  
            const pt2 = registerPoint(3000, 0).data.pointId;  
            const pt3 = registerPoint(3000, 2000).data.pointId;  
            const pt4 = registerPoint(0, 2000).data.pointId;  
            wall1Id = registerWall(pt1, pt2).data.wallId;  
            wall2Id = registerWall(pt2, pt3).data.wallId;  
            wall3Id = registerWall(pt3, pt4).data.wallId;  
            wall4Id = registerWall(pt4, pt1).data.wallId;  
            const res = registerRoom([pt1, pt2, pt3, pt4], [wall1Id, wall2Id, wall3Id, wall4Id], 2500);  
            if (res.success) roomId = res.data.roomId;  
            console.log('Комната создана:', roomId);  
        }  

        document.getElementById('btnCreateRoom').addEventListener('click', () => {  
            createRoom();  
        });  

        document.getElementById('btnAddWindow').addEventListener('click', () => {  
            if (!roomId) { console.error('Сначала создайте комнату'); return; }  
            const res = registerOpening(wall1Id, roomId, 'window', 1300, 1300, 1500);  
            console.log(res);  
        });  

        document.getElementById('btnAddDoor').addEventListener('click', () => {  
            if (!roomId) { console.error('Сначала создайте комнату'); return; }  
            const res = registerOpening(wall2Id, roomId, 'door', 800, 2100, 1000);  
            console.log(res);  
        });  

        document.getElementById('btnShowData').addEventListener('click', () => {  
            console.log(CanvasData);  
        });  

        document.getElementById('btnReset').addEventListener('click', () => {  
            CanvasData.reset();  
            roomId = null;  
            wall1Id = wall2Id = wall3Id = wall4Id = null;  
            console.log('Хранилище сброшено.');  
        });  

        window.addEventListener('load', () => {  
            renderCanvas(document.getElementById('mainCanvas'));  
        });  
    </script>  
</body>  
</html>
