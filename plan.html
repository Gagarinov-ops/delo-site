<!DOCTYPE html>  
<html lang="ru">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">  
    <title>Дело.Сайт — Редактор планов</title>  
    <link rel="stylesheet" href="styles/main.css">  
</head>  
<body>  
    <main>  
        <canvas id="mainCanvas"></canvas>  
        <canvas id="overlayCanvas"></canvas>  
    </main>  

    <header>  
        <button id="backBtn" class="icon-btn" aria-label="Назад">←</button>  
        <h1>Дело.Сайт</h1>  
        <button id="burgerBtn" class="icon-btn" aria-label="Меню">☰</button>  
        <div id="burgerMenu" class="dropdown-menu">  
            <button class="menu-item">Личный кабинет</button>  
            <button class="menu-item">Сохранить</button>  
            <button class="menu-item">Экспорт в PDF</button>  
        </div>  
    </header>  

    <nav id="toolbar">  
        <button class="tool-btn">🖱️</button>  
        <button class="tool-btn">✏️</button>  
        <button class="tool-btn">📏</button>  
        <button class="tool-btn">🧽</button>  
        <button class="tool-btn">↩️</button>  
        <div class="dropdown-wrapper">  
            <button id="elementsBtn" class="tool-btn">📦 ▼</button>  
            <div id="elementsMenu" class="dropdown-menu">  
                <button class="menu-item">Окно</button>  
                <button class="menu-item">Дверь</button>  
                <button class="menu-item">Круг</button>  
                <button class="menu-item">Квадрат</button>  
            </div>  
        </div>  
    </nav>  

    <aside id="infoPanel">  
        <dl>  
            <div class="info-row"><dt class="info-label">Название</dt><dd class="info-value">—</dd></div>  
            <div class="info-row"><dt class="info-label">Высота</dt><dd class="info-value">—</dd></div>  
            <div class="info-row"><dt class="info-label">Площадь пола</dt><dd class="info-value">—</dd></div>  
            <div class="info-row"><dt class="info-label">Площадь стен</dt><dd class="info-value">—</dd></div>  
            <div class="info-row"><dt class="info-label">Периметр</dt><dd class="info-value">—</dd></div>  
        </dl>  
    </aside>  

    <div id="toast" class="toast-hidden">Уведомление</div>  

    <script src="src/main.js" type="module"></script>  
</body>  
</html>
